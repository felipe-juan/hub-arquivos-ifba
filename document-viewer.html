<body>
  <main id="viewer" class="viewer">
    <header id="toolbar" class="toolbar">
      <div class="title">
        <a id="returnLink" class="back-link" href="./#buscar" aria-label="Voltar ao resultado da busca">←</a>
        <div class="title-copy"><strong id="docTitle">Documento</strong><small id="docMeta">HUB Arquivos IFBA</small></div>
      </div>
      <div class="actions" aria-label="Controles do documento">
        <button id="prevPage" type="button" aria-label="Página anterior">←</button>
        <label><span class="sr-only">Página</span><input id="pageNumber" class="page-input" type="number" min="1" value="1" inputmode="numeric" aria-label="Número da página" /></label>
        <span id="pageCount" aria-live="polite">/ —</span>
        <button id="nextPage" type="button" aria-label="Próxima página">→</button>
        <button id="zoomOut" class="zoom-secondary" type="button" aria-label="Diminuir zoom">−</button>
        <button id="fitPage" type="button" aria-label="Ajustar à largura">↔</button>
        <button id="zoomIn" type="button" aria-label="Aumentar zoom">＋</button>
        <a id="downloadLink" class="primary download-action" href="#" download><span class="label">Baixar</span><span aria-hidden="true">↓</span></a>
      </div>
    </header>
    <section id="stage" class="stage" aria-live="polite">
      <div id="status" class="status"><strong>Carregando documento…</strong><span>Aguarde enquanto o visualizador prepara o PDF.</span></div>
      <div id="pageSkeleton" class="page-skeleton" aria-hidden="true"></div>
      <div id="paper" class="paper" hidden>
        <canvas id="pdfCanvas"></canvas>
        <div id="textLayer" class="textLayer" aria-label="Texto selecionável do PDF"></div>
      </div>
    </section>
    <div id="matchNote" class="match-note" hidden></div>
    <div id="gestureHelp" class="gesture-help" aria-hidden="true">Deslize para mudar de página · toque duas vezes para ampliar</div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" referrerpolicy="no-referrer"></script>
  <script>
    (()=>{
      "use strict";
      const params=new URLSearchParams(location.search);
      const requested=params.get("file")||"";
      const requestedTitle=params.get("title")||"Documento";
      const requestedSection=params.get("section")||"";
      const requestedQuery=params.get("q")||"";
      const explicitPage=params.has("page")?Math.max(1,Number(params.get("page")||1)):0;
      const viewer=document.getElementById("viewer"),stage=document.getElementById("stage"),toolbar=document.getElementById("toolbar");
      const titleEl=document.getElementById("docTitle"),metaEl=document.getElementById("docMeta"),status=document.getElementById("status"),paper=document.getElementById("paper"),skeleton=document.getElementById("pageSkeleton");
      const canvas=document.getElementById("pdfCanvas"),ctx=canvas.getContext("2d",{alpha:false}),textLayer=document.getElementById("textLayer");

      let pdf=null,pdfLoadingTask=null,page=1,scale=1.2,fitScale=1.2,renderTask=null,previewRenderTask=null,textRenderTask=null,renderSerial=0,scaleInitialized=false,firstHighlightScroll=true,pendingHighlight=null,hideTimer=0,gestureTimer=0,matchNoteTimer=0;

      const pointers=new Map();

      const viewerStopWords=new Set(["para","como","com","das","dos","uma","documento","pagina","página"]);const queryTerms=[...new Set(normalize(`${requestedQuery} ${requestedSection}`).replace(/[^a-z0-9ç\s]/g," ").split(/\s+/).filter(term=>term.length>=4&&!viewerStopWords.has(term)))];
      const safeLocal=value=>{const clean=String(value||"").trim();if(!clean)return null;try{const url=new URL(clean,location.href);if(url.origin!==location.origin)throw new Error("Origem externa");return url}catch(_){return null}};
      const fileUrl=safeLocal(requested);
      const returnUrl=safeLocal(params.get("returnTo")||"");
      if(returnUrl)returnLink.href=`${returnUrl.pathname}${returnUrl.search}${returnUrl.hash}`;
      else returnLink.addEventListener("click",event=>{if(document.referrer&&safeLocal(document.referrer)&&history.length>1){event.preventDefault();history.back()}});
      const file=fileUrl?.href||"";
      download.href=file||"#";download.download=(file.split("/").pop()||"documento.pdf").split(/[?#]/)[0];
      const storageKey=`hubPdfLastPage:${normalize(fileUrl?.pathname||requestedTitle).slice(-160)}`;
      const savedPage=()=>{try{return Math.max(1,Number(localStorage.getItem(storageKey)||1))}catch(_){return 1}};
      page=explicitPage||savedPage();
      const clamp=(value,min,max)=>Math.min(max,Math.max(min,value));

      function showError(message){status.hidden=false;skeleton.hidden=true;paper.hidden=true;const title=document.createElement("strong"),detail=document.createElement("span");title.textContent="Não foi possível abrir o documento.";detail.textContent=String(message||"Erro desconhecido.");status.replaceChildren(title,detail);if(file){const actions=document.createElement("div"),link=document.createElement("a");actions.className="error-actions";link.href=file;link.target="_blank";link.rel="noopener";link.textContent="Tentar abrir o arquivo original";actions.append(link);status.append(actions)}}
      function setLoading(active){skeleton.hidden=!active;if(active){status.hidden=true;paper.hidden=true}else{skeleton.hidden=true;paper.hidden=false}}
      function showControls(){viewer.classList.remove("controls-hidden");clearTimeout(hideTimer);if(mobileQuery.matches)hideTimer=setTimeout(()=>{if(!toolbar.matches(":focus-within"))viewer.classList.add("controls-hidden")},2600)}
      function showGestureHelp(){if(!mobileQuery.matches)return;gestureHelp.classList.add("visible");clearTimeout(gestureTimer);gestureTimer=setTimeout(()=>gestureHelp.classList.remove("visible"),2200)}

      function savePage(){try{localStorage.setItem(storageKey,String(page))}catch(_){}}
      function highlightText(){let count=0,first=null;if(!queryTerms.length)return 0;textLayer.querySelectorAll("span").forEach(span=>{const text=normalize(span.textContent);const hit=queryTerms.some(term=>text.includes(term)||(text.length>=4&&term.includes(text)));if(hit){span.classList.add("search-hit");count+=1;if(!first)first=span}});if(first&&firstHighlightScroll)pendingHighlight=first;return count}
      function showMatchNote(hits){window.clearTimeout(matchNoteTimer);matchNote.replaceChildren();if(hits){const strong=document.createElement("strong");strong.textContent=String(hits);matchNote.append(strong,document.createTextNode(` destaque${hits===1?"":"s"} nesta página${requestedSection?` · ${requestedSection}`:""}`))}else matchNote.textContent=`Nenhum destaque literal nesta página${requestedSection?` · trecho: ${requestedSection}`:""}`;matchNote.hidden=false;matchNoteTimer=window.setTimeout(()=>{matchNote.hidden=true},4200)}
      async function renderText(pdfPage,viewport,serial,pageNumber){try{textRenderTask?.cancel?.()}catch(_){}textRenderTask=null;textLayer.replaceChildren();textLayer.style.width=`${viewport.width}px`;textLayer.style.height=`${viewport.height}px`;try{const content=await getTextContent(pdfPage,pageNumber);if(serial!==renderSerial)return;const nextLayer=document.createElement("div");const task=pdfjsLib.renderTextLayer({textContentSource:content,container:nextLayer,viewport,textDivs:[]});textRenderTask=task;await task.promise;if(textRenderTask===task)textRenderTask=null;if(serial!==renderSerial)return;textLayer.replaceChildren(...nextLayer.childNodes);const hits=highlightText();if(queryTerms.length)showMatchNote(hits)}catch(error){if(error?.name!=="RenderingCancelledException"&&serial===renderSerial)console.warn("Camada de texto indisponível:",error)}}

      async function render({preservePoint=null}={}){if(!pdf)return;const serial=++renderSerial;page=clamp(Math.round(page||1),1,pdf.numPages);const requestedPage=page;pageInput.value=String(page);countEl.textContent=`/ ${pdf.numPages}`;document.getElementById("prevPage").disabled=page<=1;document.getElementById("nextPage").disabled=page>=pdf.numPages;setLoading(true);paper.classList.remove("is-refining");cancelRenderTasks();try{const pdfPage=await getPdfPage(requestedPage);if(serial!==renderSerial)return;const baseViewport=pdfPage.getViewport({scale:1});fitScale=fitForPage(baseViewport);if(!scaleInitialized){scale=fitScale;scaleInitialized=true}else scale=clamp(scale,.45,4);const viewport=pdfPage.getViewport({scale});const ratio=Math.max(1,Math.min(window.devicePixelRatio||1,2.5));canvas.style.width=`${viewport.width}px`;canvas.style.height=`${viewport.height}px`;paper.style.width=`${viewport.width}px`;paper.style.height=`${viewport.height}px`;const cacheKey=`${requestedPage}:${scale.toFixed(3)}:${ratio.toFixed(2)}`,cachedBitmap=lruGet(bitmapCache,cacheKey);if(cachedBitmap){canvas.width=Math.floor(viewport.width*ratio);canvas.height=Math.floor(viewport.height*ratio);ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(cachedBitmap,0,0,canvas.width,canvas.height);setLoading(false);renderText(pdfPage,viewport,serial,requestedPage)}else{const previewRatio=Math.min(1,Math.max(.45,ratio*.42));canvas.width=Math.floor(viewport.width*previewRatio);canvas.height=Math.floor(viewport.height*previewRatio);ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);const previewTransform=previewRatio===1?null:[previewRatio,0,0,previewRatio,0,0];previewRenderTask=pdfPage.render({canvasContext:ctx,viewport,transform:previewTransform});await previewRenderTask.promise;previewRenderTask=null;if(serial!==renderSerial)return;setLoading(false);paper.classList.add("is-refining");const sharpCanvas=document.createElement("canvas"),sharpCtx=sharpCanvas.getContext("2d",{alpha:false});if(!sharpCtx)throw new Error("O navegador não disponibilizou o contexto gráfico necessário para refinar a página.");sharpCanvas.width=Math.floor(viewport.width*ratio);sharpCanvas.height=Math.floor(viewport.height*ratio);const sharpTransform=ratio===1?null:[ratio,0,0,ratio,0,0];renderTask=pdfPage.render({canvasContext:sharpCtx,viewport,transform:sharpTransform});await Promise.all([renderTask.promise,renderText(pdfPage,viewport,serial,requestedPage)]);renderTask=null;if(serial!==renderSerial)return;canvas.width=sharpCanvas.width;canvas.height=sharpCanvas.height;ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(sharpCanvas,0,0);paper.classList.remove("is-refining");if(window.createImageBitmap){try{const bitmap=await createImageBitmap(sharpCanvas);lruSet(bitmapCache,cacheKey,bitmap,BITMAP_CACHE_LIMIT,item=>item?.close?.())}catch(_){}}}if(serial!==renderSerial)return;metaEl.textContent=`${pdf.numPages} página${pdf.numPages===1?"":"s"} · página ${page}${requestedSection?` · ${requestedSection}`:""}`;if(pendingHighlight&&firstHighlightScroll){firstHighlightScroll=false;const target=pendingHighlight;pendingHighlight=null;requestAnimationFrame(()=>target.scrollIntoView({block:"center",inline:"center",behavior:"smooth"}))}savePage();updateLocation();if(preservePoint){const factor=scale/preservePoint.oldScale;stage.scrollLeft=(preservePoint.scrollLeft+preservePoint.x)*factor-preservePoint.x;stage.scrollTop=(preservePoint.scrollTop+preservePoint.y)*factor-preservePoint.y}showControls()}catch(error){paper.classList.remove("is-refining");if(error?.name!=="RenderingCancelledException"&&serial===renderSerial)showError(error?.message||error)}}

      document.addEventListener("keydown",event=>{if(event.target.matches("input,textarea,select"))return;if(event.key==="ArrowLeft")changePage(-1);if(event.key==="ArrowRight")changePage(1);if(event.key==="+")setScale(scale+.18);if(event.key==="-")setScale(scale-.18);if(event.key==="0")fitWidth()});
      stage.addEventListener("pointerdown",event=>{if(event.pointerType==="mouse"&&event.button!==0)return;showControls();stage.setPointerCapture?.(event.pointerId);pointers.set(event.pointerId,{x:event.clientX,y:event.clientY});const rect=stage.getBoundingClientRect();if(pointers.size===1){gesture={id:event.pointerId,startX:event.clientX,startY:event.clientY,lastX:event.clientX,lastY:event.clientY,startTime:performance.now(),scrollLeft:stage.scrollLeft,scrollTop:stage.scrollTop,panned:false,pinched:false,localX:event.clientX-rect.left,localY:event.clientY-rect.top}}else if(pointers.size===2){const values=[...pointers.values()];gesture.pinched=true;gesture.baseDistance=Math.hypot(values[0].x-values[1].x,values[0].y-values[1].y);gesture.baseScale=scale;gesture.centerX=(values[0].x+values[1].x)/2-rect.left;gesture.centerY=(values[0].y+values[1].y)/2-rect.top;pinchPreviewScale=scale;viewer.classList.add("is-gesture-active")}});
      stage.addEventListener("pointermove",event=>{if(!pointers.has(event.pointerId)||!gesture)return;const point=pointers.get(event.pointerId);point.x=event.clientX;point.y=event.clientY;if(pointers.size>=2&&gesture.pinched){const values=[...pointers.values()];const distance=Math.hypot(values[0].x-values[1].x,values[0].y-values[1].y);pinchPreviewScale=clamp(gesture.baseScale*(distance/Math.max(1,gesture.baseDistance)),.45,4);paper.style.transformOrigin=`${gesture.centerX+stage.scrollLeft}px ${gesture.centerY+stage.scrollTop}px`;paper.style.transform=`scale(${pinchPreviewScale/scale})`;event.preventDefault();return}const dx=event.clientX-gesture.startX,dy=event.clientY-gesture.startY;gesture.lastX=event.clientX;gesture.lastY=event.clientY;if(scale>fitScale+.04){stage.scrollLeft=gesture.scrollLeft-dx;stage.scrollTop=gesture.scrollTop-dy;if(Math.hypot(dx,dy)>8)gesture.panned=true;event.preventDefault()}});
      function finishPointer(event){if(!pointers.has(event.pointerId)||!gesture)return;const ended=pointers.get(event.pointerId);pointers.delete(event.pointerId);if(gesture.pinched){if(pointers.size<2){paper.style.transform="";paper.style.transformOrigin="0 0";viewer.classList.remove("is-gesture-active");const preserve={oldScale:scale,x:gesture.centerX,y:gesture.centerY,scrollLeft:stage.scrollLeft,scrollTop:stage.scrollTop};scale=pinchPreviewScale||scale;gesture=null;render({preservePoint:preserve})}return}const dx=ended.x-gesture.startX,dy=ended.y-gesture.startY,duration=performance.now()-gesture.startTime;const isTap=Math.hypot(dx,dy)<12&&!gesture.panned;if(isTap){const now=performance.now();if(now-lastTap.time<340&&Math.hypot(gesture.localX-lastTap.x,gesture.localY-lastTap.y)<42){const old=scale;const target=Math.abs(scale-fitScale)<.08?Math.min(4,fitScale*2.15):fitScale;lastTap.time=0;setScale(target,{x:gesture.localX,y:gesture.localY});if(target>old)showGestureHelp()}else{lastTap={time:now,x:gesture.localX,y:gesture.localY}}}else if(scale<=fitScale+.04&&duration<850&&Math.abs(dx)>72&&Math.abs(dx)>Math.abs(dy)*1.35){changePage(dx<0?1:-1)}gesture=null;showControls()}
      stage.addEventListener("pointerup",finishPointer);stage.addEventListener("pointercancel",finishPointer);stage.addEventListener("contextmenu",event=>{if(mobileQuery.matches)event.preventDefault()});stage.addEventListener("scroll",showControls,{passive:true});toolbar.addEventListener("pointerdown",showControls);window.addEventListener("resize",()=>{clearTimeout(window.__hubPdfResize);window.__hubPdfResize=setTimeout(()=>{if(pdf&&Math.abs(scale-fitScale)<.12){scaleInitialized=false;render()}},180)});
      window.addEventListener("beforeunload",()=>{cancelRenderTasks();try{pdfLoadingTask?.destroy()}catch(_){};bitmapCache.forEach(bitmap=>bitmap?.close?.());bitmapCache.clear();pageCache.forEach(cleanupPdfPage);pageCache.clear();textContentCache.clear()},{once:true});
      init();
    })();
  </script>
