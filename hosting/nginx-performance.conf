gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;

# Ative apenas quando o módulo Brotli estiver instalado:
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;

location = / { add_header Cache-Control "no-cache" always; }
location = /index.html { add_header Cache-Control "no-cache" always; }
location ~* \.html$ { add_header Cache-Control "no-cache" always; }
location = /VERSION { add_header Cache-Control "no-cache" always; }
location = /documents/manifest.json { add_header Cache-Control "no-cache" always; }
location = /documents/manifest-summary.json { add_header Cache-Control "no-cache" always; }
location = /documents/search-index.json { add_header Cache-Control "no-cache" always; }
location ~* ^/(?:assets|apps)/build/.*\.[0-9a-f]{8,}\.(?:js|css)$ {
  add_header Cache-Control "public, max-age=31536000, immutable" always;
}
location ~* ^/assets/document-thumbnails/.*\.webp$ {
  add_header Cache-Control "public, max-age=31536000, immutable" always;
}
location ~* \.(?:js|css|woff2?|png|jpe?g|webp|avif|svg|ico)$ {
  add_header Cache-Control "public, max-age=2592000" always;
}
